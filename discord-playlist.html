<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiscordQueue</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #ffffff0f;
    --accent: #ff6b2b;
    --accent2: #ffb347;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --youtube: #ff4444;
    --spotify: #1db954;
    --active-glow: 0 0 30px #ff6b2b44;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: 64px 1fr;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .header-channel {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  .header-channel .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--spotify);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* PLAYER AREA */
  .player-area {
    display: flex;
    flex-direction: column;
    padding: 28px;
    gap: 20px;
    overflow: hidden;
  }

  .now-playing-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .now-playing-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--accent)44, transparent);
  }

  .embed-container {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .embed-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .embed-placeholder {
    text-align: center;
    color: var(--muted);
  }

  .embed-placeholder .big-icon {
    font-size: 64px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .embed-placeholder p {
    font-size: 14px;
  }

  /* Spotify compact wrapper */
  .spotify-wrapper {
    width: 100%;
    max-width: 520px;
    margin: auto;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .track-info {
    flex: 1;
    min-width: 0;
  }

  .track-title {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .track-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .source-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }

  .source-badge.youtube { background: #ff444422; color: var(--youtube); border: 1px solid #ff444433; }
  .source-badge.spotify { background: #1db95422; color: var(--spotify); border: 1px solid #1db95433; }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 42px; height: 42px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: #ff6b2b11;
  }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    width: 48px; height: 48px;
    font-size: 18px;
  }

  .btn.primary:hover {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
    box-shadow: var(--active-glow);
  }

  /* QUEUE SIDEBAR */
  .sidebar {
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
  }

  .queue-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .queue-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .queue-list::-webkit-scrollbar { width: 4px; }
  .queue-list::-webkit-scrollbar-track { background: transparent; }
  .queue-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .queue-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    border: 1px solid transparent;
    margin-bottom: 4px;
  }

  .queue-item:hover {
    background: var(--surface2);
    border-color: var(--border);
  }

  .queue-item.active {
    background: #ff6b2b11;
    border-color: #ff6b2b33;
  }

  .queue-item.played {
    opacity: 0.45;
  }

  .queue-index {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  .queue-item.active .queue-index {
    color: var(--accent);
  }

  .queue-source-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .queue-source-dot.youtube { background: var(--youtube); }
  .queue-source-dot.spotify { background: var(--spotify); }

  .queue-item-info {
    flex: 1;
    min-width: 0;
  }

  .queue-item-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .queue-item.active .queue-item-title {
    color: var(--accent2);
  }

  .queue-item-user {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .queue-item-user::before {
    content: '#';
    color: #5865f2;
  }

  /* Add link area */
  .add-area {
    padding: 14px;
    border-top: 1px solid var(--border);
  }

  .add-input-row {
    display: flex;
    gap: 8px;
  }

  .add-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-input::placeholder { color: var(--muted); }
  .add-input:focus { border-color: var(--accent); }

  .add-btn {
    background: var(--accent);
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    transition: background 0.15s;
  }

  .add-btn:hover { background: var(--accent2); color: #000; }

  .add-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Playing animation bars */
  .playing-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
  }

  .bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: bounce 0.8s ease-in-out infinite;
  }

  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.2s; }

  @keyframes bounce {
    0%, 100% { height: 4px; }
    50% { height: 14px; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">DiscordQueue</div>
    <div class="logo-tag">PROTOTYPE</div>
    <div class="header-channel">
      <div class="dot"></div>
      <span>#music-links</span>
    </div>
  </header>

  <div class="player-area">
    <div class="now-playing-label">Now Playing</div>

    <div class="embed-container" id="embedContainer">
      <div class="embed-placeholder" id="placeholder">
        <div class="big-icon">🎵</div>
        <p>Select a track from the queue to begin</p>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="prevBtn" title="Previous" onclick="prevTrack()">&#9664;</button>
      <div class="track-info">
        <div class="track-title" id="trackTitle">No track selected</div>
        <div class="track-meta">
          <span id="sourceBadge" class="source-badge hidden"></span>
          <span id="postedBy" style="color:var(--muted); font-size:12px;"></span>
        </div>
      </div>
      <button class="btn primary" id="nextBtn" title="Next" onclick="nextTrack()">&#9654;&#9654;</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Queue</div>
      <div class="queue-count" id="queueCount">0 tracks</div>
    </div>

    <div class="queue-list" id="queueList"></div>

    <div class="add-area">
      <div class="add-input-row">
        <input class="add-input" id="addInput" type="text" placeholder="Paste YouTube or Spotify link…" />
        <button class="add-btn" onclick="addLink()">Add</button>
      </div>
      <div class="add-hint">youtube.com · youtu.be · open.spotify.com</div>
    </div>
  </div>
</div>

<script>
// ── Sample data (simulating links collected from a Discord channel) ──
const initialTracks = [
  {
    type: 'youtube',
    id: 'jfKfPfyJRdk',
    title: 'lofi hip hop radio - beats to relax/study to',
    user: 'alex_j'
  },
  {
    type: 'spotify',
    id: '4iV5W9uYEdYUVa79Axb7Rh',
    title: 'Bohemian Rhapsody',
    user: 'sarah.m'
  },
  {
    type: 'youtube',
    id: 'ZbZSe6N_BXs',
    title: 'Happy - Pharrell Williams',
    user: 'devz99'
  },
  {
    type: 'spotify',
    id: '0VjIjW4GlUZAMYd2vXMi3b',
    title: 'Blinding Lights',
    user: 'nina_k'
  },
  {
    type: 'youtube',
    id: 'kXYiU_JCYtU',
    title: 'Numb - Linkin Park',
    user: 'retrowave'
  },
  {
    type: 'spotify',
    id: '5CQ30WqJwcep0pYcV4AMNc',
    title: 'Stairway to Heaven',
    user: 'classicrock_dan'
  },
];

let queue = [...initialTracks];
let currentIndex = -1;

function getYouTubeId(url) {
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

function getSpotifyId(url) {
  const m = url.match(/open\.spotify\.com\/track\/([a-zA-Z0-9]+)/);
  return m ? m[1] : null;
}

function parseLink(url) {
  const ytId = getYouTubeId(url);
  if (ytId) return { type: 'youtube', id: ytId, title: 'YouTube Track', user: 'you' };
  const spId = getSpotifyId(url);
  if (spId) return { type: 'spotify', id: spId, title: 'Spotify Track', user: 'you' };
  return null;
}

function addLink() {
  const input = document.getElementById('addInput');
  const url = input.value.trim();
  if (!url) return;
  const track = parseLink(url);
  if (!track) {
    input.style.borderColor = 'var(--youtube)';
    setTimeout(() => input.style.borderColor = '', 800);
    return;
  }
  queue.push(track);
  input.value = '';
  renderQueue();
}

document.getElementById('addInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addLink();
});

function renderQueue() {
  const list = document.getElementById('queueList');
  document.getElementById('queueCount').textContent = `${queue.length} track${queue.length !== 1 ? 's' : ''}`;

  list.innerHTML = queue.map((track, i) => `
    <div class="queue-item ${i === currentIndex ? 'active' : ''} ${i < currentIndex ? 'played' : ''}"
         onclick="playTrack(${i})">
      <div class="queue-index">
        ${i === currentIndex
          ? `<div class="playing-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>`
          : (i + 1)}
      </div>
      <div class="queue-source-dot ${track.type}"></div>
      <div class="queue-item-info">
        <div class="queue-item-title">${escHtml(track.title)}</div>
        <div class="queue-item-user">${escHtml(track.user)}</div>
      </div>
    </div>
  `).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function playTrack(index) {
  if (index < 0 || index >= queue.length) return;
  currentIndex = index;
  const track = queue[index];

  // Update info bar
  document.getElementById('trackTitle').textContent = track.title;
  const badge = document.getElementById('sourceBadge');
  badge.textContent = track.type.toUpperCase();
  badge.className = `source-badge ${track.type}`;
  badge.classList.remove('hidden');
  document.getElementById('postedBy').textContent = `posted by @${track.user}`;

  // Build embed
  const container = document.getElementById('embedContainer');
  document.getElementById('placeholder').classList.add('hidden');

  if (track.type === 'youtube') {
    container.innerHTML = `
      <iframe
        src="https://www.youtube.com/embed/${track.id}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>`;
  } else {
    container.innerHTML = `
      <div class="spotify-wrapper">
        <iframe
          src="https://open.spotify.com/embed/track/${track.id}?utm_source=generator&theme=0"
          width="100%"
          height="352"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
        <div style="text-align:center; margin-top:20px;">
          <button onclick="nextTrack()" style="
            background: var(--accent); border: none; color: white;
            padding: 10px 24px; border-radius: 8px; cursor: pointer;
            font-family: Outfit, sans-serif; font-size: 13px; font-weight: 600;
            letter-spacing: 0.5px;
          ">Skip to Next →</button>
          <div style="margin-top:8px; font-size:11px; color:var(--muted); font-family:JetBrains Mono, monospace;">
            Spotify previews are 30s for non-logged-in users
          </div>
        </div>
      </div>`;
  }

  renderQueue();

  // Scroll active item into view
  setTimeout(() => {
    const active = document.querySelector('.queue-item.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function nextTrack() {
  if (currentIndex < queue.length - 1) {
    playTrack(currentIndex + 1);
  }
}

function prevTrack() {
  if (currentIndex > 0) {
    playTrack(currentIndex - 1);
  }
}

// Listen for YouTube video ending via postMessage
window.addEventListener('message', (e) => {
  try {
    const data = JSON.parse(e.data);
    // YT state 0 = ended
    if (data.event === 'onStateChange' && data.info === 0) {
      nextTrack();
    }
  } catch {}
});

// Init
renderQueue();
</script>
</body>
</html>
